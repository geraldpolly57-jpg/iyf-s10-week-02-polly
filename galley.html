<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    
    <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    h1 {
      margin: 20px;
    }

    .gallery img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }
  </style>

<body>
    <div class="gallery">
    <h1>Gallery</h1>
    <img src="https://images.pexels.com/photos/30208153/pexels-photo-30208153.jpeg" alt="Gallery Image 1">

    <img src="https://images.pexels.com/photos/11285626/pexels-photo-11285626.jpeg" alt="Gallery Image 2">

    <img src="https://images.pexels.com/photos/17966026/pexels-photo-17966026.jpeg" alt="Gallery Image 3">

    <img src="https://images.pexels.com/photos/27887562/pexels-photo-27887562.jpeg" alt="Gallery Image 4">
    </div>
</body>
</html>
